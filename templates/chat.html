<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVEREST Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Floating Chatbot Button -->
    <button id="chatToggle" class="chat-toggle-btn" aria-label="Open chatbot">
        💬
    </button>

    <!-- Chat Widget -->
    <div id="chatWidget" class="chat-widget hidden">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="bot-avatar animated-avatar">
    <div class="girl-face">
        <div class="hair"></div>
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="smile"></div>
        <div class="body"></div>
        <div class="arm left-arm"></div>
        <div class="arm right-arm"></div>
    </div>
</div>
                <div>
                    <h3>EVEREST</h3>
                    <p>PIMS Virtual Assistant</p>
                </div>
            </div>
            <button id="closeChat" class="close-btn" aria-label="Close chatbot">✕</button>
        </div>

        <div id="chatBody" class="chat-body">
            <div class="message bot">
                <div class="message-content">
                    Hi! I’m <strong>EVEREST</strong>, the official assistant for Padmashree Institute of Management &amp; Sciences.<br><br>
                    Ask me about admissions, courses, facilities, campus info, and more.
                </div>
            </div>
        </div>

        <div id="typingIndicator" class="typing-indicator hidden">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <form id="chatForm" class="chat-input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Type your question here..."
                autocomplete="off"
                required
            >
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatToggle = document.getElementById("chatToggle");
        const chatWidget = document.getElementById("chatWidget");
        const closeChat = document.getElementById("closeChat");
        const chatForm = document.getElementById("chatForm");
        const userInput = document.getElementById("userInput");
        const chatBody = document.getElementById("chatBody");
        const typingIndicator = document.getElementById("typingIndicator");

        chatToggle.addEventListener("click", () => {
            chatWidget.classList.toggle("hidden");
        });

        closeChat.addEventListener("click", () => {
            chatWidget.classList.add("hidden");
        });

        function appendMessage(sender, text) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", sender);

            const contentDiv = document.createElement("div");
            contentDiv.classList.add("message-content");
            contentDiv.innerHTML = text.replace(/\n/g, "<br>");

            messageDiv.appendChild(contentDiv);
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function showTyping() {
            typingIndicator.classList.remove("hidden");
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.classList.add("hidden");
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const question = userInput.value.trim();
            if (!question) return;

            appendMessage("user", question);
            userInput.value = "";
            showTyping();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: question })
                });

                const data = await response.json();
                hideTyping();

                if (data.answer) {
                    appendMessage("bot", data.answer);
                } else {
                    appendMessage("bot", "Sorry, I couldn't process your request right now.");
                }
            } catch (error) {
                hideTyping();
                appendMessage("bot", "Something went wrong. Please try again later.");
            }
        });
    </script>

</body>
</html>
